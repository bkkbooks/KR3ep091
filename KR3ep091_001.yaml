body:
  text: 上卷內傷雜病門陰虧於下陽浮於上服八味丸不效者以附子走竄不能收納耳宜加減法桂都氣丸詒按議論精細可為用藥者開一悟境肝陽盛肝陰虛吸引及腎腎亦傷矣益肝體損肝用滋養腎陰俾水木相榮病當自愈生地白芍小薊赤芍當歸血餘丹皮阿膠甘草茅根詒按此必因肝火而見血者故方藥如此左關獨大下侵入尺知肝陽亢甚下吸腎陰陰愈虧則陽益張矣滋水清肝乃正法也知柏八味丸加天冬龜板杞子詒按方中似宜再增清肝之品陰不足者陽必上亢而內燔欲陽之降必滋其陰徒恃清涼無益也生地知母甘草黑梔麥冬玄參丹皮地骨皮詒按案語精粹有名雋氣腎精不足肝火乘之故有筋攣骨痿耳竅二陰氣出等證夫肝火宜泄腎精宜閉於一方之中兼通補之法庶幾合理然非旦夕所能奏功也生地川楝子茯苓阿膠丹皮女貞子詒按論病深中肯綮方中可增白芍牡蠣肝陰不足肝火偏勝傷肺則咳自傷則脅痛阿膠兜鈴丹參炙草歸身白芍玉竹川斛詒按既有脅痛見證似當兼與通絡清肝宜加丹皮山梔青皮橘絡旋覆等味咯血脅痛項下有核脈數惡熱咽痛便溏此肝火乘脾之證反能食者脾求助於食而又不能勝之則痞耳治在制肝益脾白芍茯苓川連牡蠣炙草木瓜益智阿膠詒按論病明快方中擬加丹梔夏枯草飲食既少血去過多陰氣之傷蓋已甚矣茲復憂勞驚恐志火內動陰氣益傷致有心煩體痛頭疼等證是當滋養心肝血液以制浮動之陽者也生地石斛麥冬丹皮玄參知母茯苓甘草詒按肝陰既虧肝火上升宜再加歸芍以滋養之羚羊菊梔以清泄之肝臟失調侵脾則腹痛侮肺則乾咳病從內生非外感客邪之比是宜內和臟氣不當外奪衛氣者也但脈弱而數形瘦色槁上熱下寒根本已漓恐難全愈歸身白芍炙草茯苓桂枝飴糖詒按此內補建中法宜於腹痛而不宜於乾咳宜加清肝保肺之味乃為周匝形盛脈充兩尺獨虛下體麻痹火浮氣急此根本不固枝葉雖盛未足恃也熟地山藥沙苑杞子丹皮茯苓桑椹牛膝詒按如此脈證似可參用腎氣法以溫攝之真陽以腎為宅以陰為妃腎虛陰衰則陽無偶而蕩矣由是上炎則頭耳口鼻為病下走則膀胱二陰受傷自春及秋屢用滋養清利之劑欲以養陰而適以傷陽不能治下而反以戕中內經所謂熱病未已寒病復起者是也鄙意擬以腎氣丸直走少陰據其窟宅而招之同聲相應同氣相求之道也所慮者病深氣極藥入不能制病而反為病所用則有增劇耳腎氣丸詒按立論透切醫案中僅見之作真陽氣弱不榮於筋則陰縮不固於里則精出不衛於表則汗泄此三者每相因而見其病在三陰之樞非後世方法可治古方八味丸專服久服當有驗也八味丸詒按見識老到議論明確此為可法可傳之作胃寒背冷食入則倦喜溫惡清以背為陽位胃為陽土土寒則食不運陽傷則氣不振也治宜溫養陽氣人參桂枝益智仁厚朴炮姜茯苓炙草白朮詒按此溫中和氣平正通達之方中氣虛寒得冷則瀉而又火升齒衄古人所謂胸中聚集之殘火腹內積久之沉寒也此當溫補中氣俾土厚則火自斂四君子湯加益智仁乾薑詒按議病立方均本喻氏近時黃坤載亦有此法類中門類中偏左於法為逆猶幸病勢尚輕可以緩圖取效原方補少通多最為合理惟是陽脈則緩陰脈則急所以指節能屈不能伸此亦病之關鍵處不可忽也經云肝苦急宜食甘以緩之於前方中增進陰藥之甘潤者一二更為美備人參茯苓半夏白朮炙草橘紅麥冬竹瀝薑汁詒按此六君加麥冬竹瀝薑汁也再診加當歸脈虛而澀左半手足麻痹食不知味此氣血不能運行周體乃類中之漸也桂枝茯苓歸身半夏炙草黃耆天麻首烏詒按滋養疏化虛實兼到內風本皆陽氣之化然非有餘也乃二氣不主交合之故今形寒跗冷似宜補陽為是但景嶽云陽失陰而離者非補陰無以攝既散之元陽此證有升無降舌絳牽掣喑不出聲足躄不堪行動當與河間肝腎氣厥同例參用丹溪虎潛法熟地萸肉牛膝鎖陽虎骨龜板詒按持論明通立方簡當再診地黃飲子去附子加鹿鞭子煎膠打丸熱風中絡口歪舌謇咽痛治以清滋羚羊角玄參鉤藤甘菊甘草石菖蒲生地竹瀝再診生地阿膠麥冬知母貝母甘菊甘草玄參三診咽喉干痛滋清不愈宜從降導腎氣丸淡鹽湯送下詒按先清之繼滋之終用引火下行之法步伐井然凌躐急功者可取法焉方書每以左癱屬血虛右瘓屬氣虛據述頻年已來齒疼舌赤常有精濁納穀如昔卒然右偏肢痿舌強口喎語謇脈浮數動此乃肝腎兩虛水不涵木肝風暴動神必昏迷河間所謂肝腎氣厥舌喑不語足痱無力之證但腎屬坎水真陽內藏宜溫以攝納而肝藏相火內寄又宜涼以清之溫腎之方參入涼肝是為復方之用地黃飲子去桂附加天冬阿膠詒按即古法而化裁之參詳脈證斟酌盡善寒熱後邪走手少陰之絡猝然不語肩背牽引不舒宜辛以通之菖蒲遠志甘草木通當歸丹皮丹參茯苓詒按方法輕靈恰合餘邪入絡治法脈濡按之則弦右肩及手指麻木兩腿痠癢難以名狀此脾飲肝風相合為病乃類中之漸不可不慎首烏天麻刺蒺藜羚羊角炙草茯苓半夏白芍丹皮廣皮薑汁和竹瀝泛丸詒按以二陳薑汁竹瀝除痰飲以丹芍羚蒺首烏天麻治肝風兩層俱到就見證論歸身牛膝橘絡亦可加入痿痹門脈虛而數兩膝先軟後腫不能屈伸此濕熱乘陰氣之虛而下注久則成鶴膝風矣生地牛膝茯苓木瓜丹皮薏仁山藥萸肉澤瀉萆薢詒按正虛著邪故補散宜並用濕而兼熱故滋燥不可偏此以六味治陰虛增入牛膝木瓜薏仁萆薢以除濕熱所謂虛實兼顧也內風門肢麻頭運此肝病也便溏食減脾亦病矣宜節勞養氣毋致風動為佳羚羊角白朮刺蒺藜茯苓炙草天麻白芍廣皮詒按肝脾兩治方法周到眩運嘔惡胸滿小便短而數口中乾水虧於下風動於上飲積於中病非一端也羚羊角細生地鉤勾天麻茯苓廣皮半夏竹茹詒按病非一端方欲打成一片非熟於制方之義者不能擬再增生牡蠣再診前方去生地加麥冬三診人參茯苓麥冬羚羊角天麻半夏炙草石斛廣皮肝陰不足則火動生風脾失健運則液聚成痰調理肝脾當漸愈也半夏茯苓廣皮鉤勾生地竹瀝麻仁汁詒按案屬通論方中宜加用白芍方能顧到肝經再診和養中氣人參陳皮生穀芽石斛茯苓木瓜肝陽化風逆行脾胃之分胃液成痰流走肝膽之絡右腿麻痹胸膈痞悶所由來也而風火性皆上行故又有火升氣逆鼻衄等證此得之飢飽勞郁積久而成非一朝一夕之故也治法清肝之火健脾之氣亦非旦夕可圖也羚羊角廣皮天麻甘草枳實半夏茯苓白朮麥冬詒按持論明通立方周匝看似平淡無奇實非老手不辦亦當加入白芍此肝風挾痰上逆之證肢冷自汗有似陽脫實非脫也目與唇口牽引時復歌笑治宜先卻邪氣而後養正羚羊角白茯苓竹茹鬱金半夏甘草鉤勾橘紅詒按治法的當時復歌笑是心臟受邪之象菖蒲遠志膽星清心牛黃丸之類均可選入肝屬風木性喜沖逆其變動為振搖強直其治法宜柔木熄風細生地鉤勾歸身茯苓阿膠天麻羚羊角山藥柏子仁刺蒺藜詒按此方可加木瓜白芍脾失運而痰生肝不柔而風動眩運食少所由來也白朮天麻首烏廣皮半夏羚羊角茯苓鉤勾詒按案語簡煉方亦純淨四肢稟氣於脾胃脾胃虛衰無氣以稟則為振顫土虛木必搖故頭運也歸芍六君子湯加黃耆天麻詒按案語說理朴實立方以扶正為主似宜再加熄風之品其所加之黃耆恐非肝風升動者所宜木旺乘土土氣不宣痰涎郁聚傳走經絡故頭旋腳弱有似虛象實則未可徒補也首烏橘紅茯苓薏仁木瓜鉤藤刺蒺藜半夏炙草詒按首烏似嫌其澀不如用生於術為妥擬再加牛膝竹瀝薑汁神志門驟爾觸驚神出於舍舍空痰入神不得歸是以有恍惚昏亂等證治當逐痰以安神藏半夏膽星鉤藤竹茹茯神橘紅黑梔枳實詒按敘病如話如畫此等方案非有切實功夫者不能所謂成如容易卻艱辛也驚悸易泄腰疼足軟有似虛象而實因痰火蓋脈不弱數形不枯瘁未可遽與補也半夏炙草秫米橘紅茯苓竹茹遠志石菖蒲詒按此秫夏合溫膽加味也認證既確立方自然入彀抽搦厥逆合目則發此肝膽痰熱得之驚恐病名癇厥半夏橘紅竹茹膽星炙草石菖蒲枳實茯苓詒按痰火之邪因驚恐而直犯肝膽故見證如此臥則陽氣入於陰合目則發是陽氣擾動陰臟致痰火猝發而病作也方中擬加羚羊角黃連驟驚恐懼手足逆冷少腹氣衝即厥陽縮汗出下元素虧收攝失司宜乎助陽以鎮納第消渴心悸忽然腹中空洞此風消肝厥見象非桂附剛劑所宜炒黑杞子舶茴香當歸紫石英細辛桂枝詒按風消肝厥之證當於溫養中佐以滋陰方中細辛一味不識何意愚意再加牛膝白芍牡蠣肝火挾痰上逆為厥顛疾半夏鉤藤茯苓枳實廣皮竹茹鬱金羚羊角詒按方極清穩痰飲門肺飲紫菀半夏桑皮白前杏仁詒按飲邪在肺不及於胃故專用肺藥飲邪射肺為咳半夏杏仁乾薑北五味白芍炙草茯苓桂枝詒按此治飲正法也秋冬咳嗽春暖自安是腎氣收納失司陽不潛藏致水液變化痰沫隨氣射肺擾喉喘咳不能臥息入夜更重清晨稍安蓋痰飲乃水寒陰濁之邪夜為陰時陽不用事故重也仲景云飲病當以溫藥和之金匱飲門短氣倚息一條分外飲治脾內飲治腎二臟陰陽含蓄自然潛藏固攝當以腎氣丸方減牛膝肉桂加骨脂以斂精氣若以他藥發越陽氣恐有暴厥之慮矣腎氣丸減牛膝肉桂加補骨脂詒按此案推闡病原極其精鑿往昔壯年久寓閩粵南方陽氣易泄中年以來內聚痰飲交冬背冷喘嗽必吐痰沫胸脘始爽年逾六旬惡寒喜暖陽分之虛亦所應爾不宜搜逐攻劫當養少陰腎臟仿前輩水液化痰阻氣以致喘嗽之例腎氣丸減牛膝肉桂加北五味沉香詒按議論明確立方亦極精當久遺下虛秋冬咳甚氣衝於夜上逆不能安臥形寒足冷顯然水泛而為痰沫當從內飲門治若用肺藥則謬矣桂枝茯苓五味炙草白芍乾薑詒按古人云內飲治腎據此證情似可兼服腎氣丸以攝下元肝風與痰飲相搏內壅臟腑外閉竅隧以致不寐不飢肢體麻痹迄今經年脈弱色悴不攻則病不除攻之則正益虛最為棘手鉤藤菖蒲刺蒺藜遠志竹瀝鬱金膽星天竺黃另指迷茯苓丸臨臥服詒按病屬難治而立方卻周匝平穩非學有本原者不能辦此肝陽因勞而化風脾陰因滯而生痰風痰相搏上攻旁溢是以昏運體痛等證見也茲口膩不食右關微滑當先和養胃氣蠲除痰飲俟胃健能食然後培養陰氣未為晚也半夏秫米麥冬橘紅茯苓詒按審察病機以為立方步伐臨證者宜取法焉咳喘門風熱不解襲入肺中為咳為喘日晡發熱食少體倦漸成虛損頗難調治勉擬錢氏阿膠散冀其肺寧喘平方可再商他治阿膠茯苓馬兜鈴薏米杏仁炙草糯米芡實再診青蒿丹皮鱉甲茯苓石斛甘草歸身廣皮白芍詒按此正虛而兼感外邪之證乃內傷挾外感病也久嗽脈不數口不幹未必即成損證此為肺飲鬱伏不達故也厚朴煨姜桑皮杏仁廣皮甘草半夏詒按此屬飲寒傷肺乃內因之實證也體虛邪滯肺絡不清脈弦而細幸不數耳沙參桑葉杏仁茯苓馬兜鈴貝母甘草粳米詒按案語得看病之竅最宜留意肺陰不足肺熱有餘咳則涕出肌體惡風此熱從竅泄而氣不外護也他臟雖有病宜先治肺阿膠貝母沙參馬兜鈴杏仁茯苓炙草糯米詒按此等證虛實錯雜若粗工為之或與疏散或與補澀均足致損肺病以中氣健旺能食便堅為佳茲喘咳已久而大便易溏能食難運殊非所宜診得脈象與前無異但能節飲食慎寒暖猶可無虞沙參貝母炙草杏仁苡仁橘紅枇杷葉又丸方六味丸加五味子肉桂詒按不刊之論讀者最宜記好咳嗽食後則減此中氣虛餒所致治宜培中下氣法人參半夏粳米南棗麥冬炙草枇杷葉詒按此證不甚多見學者須記之久嗽便溏脈虛而數脾肺俱病培補中氣為要恐後泄不食則瘦削日增也人參白芍扁豆薏仁廣皮茯苓炙草山藥蜜炙炮薑炭詒按此亦脾肺兩治之法較前數方為切實亦以此證中氣虛寒無咽乾溺澀等虛熱亢炎之證故用藥稍可著力耳然欲求效難矣陰虛於下陽浮於上咳嗆火升甚於暮夜治肺無益法當補腎熟地杞子天冬白芍茯苓山藥丹皮龜板詒按此方即胡桃五味均可加入乾咳無痰是肝氣衝肺非肺本病仍宜治肝兼滋肺氣可也黃連白芍烏梅甘草歸身牡蠣茯苓詒按方中少潤肺之品擬加北沙參桑白皮再肝之犯肺必挾木火梔丹亦應用之藥也風傷於上濕傷於下上為咳嗽痰多下為跗腫痠痛宜先治上而後治下薄荷杏仁桔梗旋覆花甘草象貝連翹前胡詒按肺主一身之治節故以治肺為先咳甚於夜間肌熱於午後此陰虧也濁痰咳唾鼻流清涕是肺熱也病本如是奏功不易擬甘鹹潤燥法阿膠燕窩沙參海浮石瓜蔞霜川貝杏仁甘草詒按此證痰必干黏故用藥如是內熱與外熱相合肺胃受之則咳而不能食頭脹肌熱心煩宜清上中二焦竹葉蘆根花粉杏仁貝母知母桔梗橘紅詒按此外感溫燥之咳故專用清泄脈細數促是肝腎精血內耗咳嗽必吐嘔清涎濁沫此衝脈氣逆自下及上氣不收納喘而汗出根本先拔藥難奏功醫若見血為熱見嗽治肺是速其凶矣人參秋石制熟地五味子紫衣胡桃詒按此難治之證在咳嗽門中亦別是一種也脈虛數顴紅聲低咳甚吐食晡時熱升多煩躁此肝腎陰虧陽浮於上精液變化痰沫病已三年是為內損非消痰治嗽可愈固攝下焦必須絶欲以飲食如故經年可望其愈都氣丸加女貞子枸杞子天冬詒按用藥頗為切實脈微小形寒久嗽失音是氣餒陽損議固胃陽取甘溫之屬蜜炙生薑炙草白芍黃耆大棗詒按此亦虛咳中另一法門咽痛聲啞有肺損肺閉之分所謂金破不鳴金實亦不鳴也此證從外感風熱而來當作閉治溫補非宜所慮者邪不外達而內並耳阿膠杏仁桔梗貝母牛蒡玄參甘草粳米馬兜鈴詒按此錢氏補肺之類乃虛實兼治之法用復脈甘潤法嗆止音出得益水濡潤之力也無如胃弱便溏此藥不宜再用仿金匱麥門冬湯義取養土之陰以生肺金麥門冬湯詒按此用藥轉換法也久咳便溏腹滿脾肺同病已屬難治況脈數口乾潮熱肝腎之陰亦不足耶白芍薏仁茯苓蓮肉炙草廣皮扁豆詒按病重藥輕恐難奏效且於肝腎亦未顧到擬加用水泛六味丸一兩絹包入煎咳而吐沫食少噁心動作多喘中氣傷矣非清肺治咳所能愈也人參半夏麥冬炙草茯苓粳米大棗詒按此胃虛咳嗽也方宗金匱大半夏麥門冬兩湯之意咳而衄陰不足火內動也噁心不食宜先治胃竹茹粳米廣皮石斛貝母杏仁詒按既有火動而衄見證宜兼清降浮腫咳喘頸項強大飲不得下溺不得出此肺病也不下行而反上逆治節之權廢矣雖有良劑恐難奏效葶藶大棗瀉肺湯詒按此痰氣壅阻之證故重用瀉肺之劑脈寸關大而尺小口乾上氣不下足冷不溫此陽氣不潛當用陰中陽藥治之六味丸加牛膝車前五味肉桂詒按此兼腎氣都氣兩方之意脈數減咳亦緩但浮氣不得全歸根本宜補益下焦以為吸受之地六味丸加五味子菟絲子又丸方六味丸加五味子杜仲芡實蓮鬚菟絲子杞子蜜丸每服五錢詒按議論穩實方亦妥貼氣喘足冷至膝唇口乾鼻塞脈虛小下氣上逆病在根本勿以結痰在項而漫用清克也腎氣丸三錢鹽花湯送下詒按識見老當久咳喘不得臥顴赤足冷胸滿上氣飢不能食此肺實於上腎虛於下脾困於中之候也然而實不可攻姑治其虛中不可燥姑溫其下且腎為胃關火為土母或有小補未可知也金匱腎氣丸詒按擬再用旋覆代赭湯送下則上中兩層亦可關會矣兩寸浮大關遲沉小氣上而不下喘咳多痰肝腎之氣上衝於肺宜以腎氣丸補而下之腎氣丸詒按此治本之法下虛上實當治其下勿清其上真氣歸元痰熱自降宜以十味腎氣丸主之十味腎氣丸詒按識見卓老失血門絡熱血溢時氣所觸非陰虛火浮之比慎勿以滋膩治也荊芥丹皮茺蔚子丹參鬱金藕汁細生地小薊炭詒按勘證用藥老眼無花吐血得勞與怒即發脈小數微嗆病在肝心得之思慮勞心宜早圖之勿使延及肺家則吉阿膠丹皮牛膝丹參小薊炭三七藕汁童便詒按此治吐血之正法能止血而無流瘀之弊最為穩當再診前方去丹參三七藕汁童便加生地白芍茺蔚子又丸方六味丸加阿膠五味子小薊炭蓮鬚水泛丸失血咳逆心下痞滿暮則發厥血色黯大便黑肝脈獨大此有瘀血積留不去勿治其氣宜和其血製大黃白芍桃仁甘草當歸丹皮降香詒按此專治瘀積之法病後失血色紫黑不鮮此係病前所蓄胸中尚滿知瘀猶未盡也正氣雖虛未可驟補宜順而下之小薊炭赤芍生地犀角鬱金丹皮茺蔚子童便詒按此必尚有鬱熱見證故方中有犀角既有留瘀未盡可加醋炙大黃炭凡有瘀血之人其陰已傷其氣必逆茲吐血紫黑無多而胸中滿悶瘀猶未盡也而舌絳無苔此陰之虧也嘔吐不已則氣之逆也且頭重足冷有下虛上脫之慮惡寒譫語為陽弱氣餒之徵此證補之不投攻之不可殊屬棘手人參茯苓三七吳萸烏梅牡蠣川連鬱金詒按論病則層層俱透用藥亦步步著實此為高手失血後氣從下逆上足冷頭熱病在下焦真氣不納六味丸加五味牛膝牡蠣詒按方亦妥當若再進一層可用金匱腎氣法以導火下行血去過多氣必上逆肺被其沖故作咳嗽此非肺自病也觀其沖氣甚則咳甚沖氣緩則咳緩可以知矣擬攝降法先治沖氣金匱腎氣丸去肉桂加牡蠣詒按認證獨的法亦老當脈寸靜尺動屢經失血覺氣從下焦上衝則嗆勞動則氣促不舒此病不在肺而在腎治嗽無益宜滋腎陰熟地天麻牡蠣茯苓杞子萸肉五味子詒按病與上條相同方中用天麻不知何意心脈獨大口乾易汗善怒血逆此心陰不足心陽獨亢宜犀角地黃湯犀角地黃湯加茅根甘草山梔詒按方案均精簡尉帖痰中有血點散漫此心病也口乾心熱當是傷暑因暑喜歸心故耳生地茯神扁豆甘草丹皮竹茹麥冬藕汁詒按方法清靈可喜葛可久論吐血治法每於血止瘀消之後用獨參湯以益心定志茲以陰藥參之慮其上升而助肺熱也人參沙參生地阿膠牛膝茯苓詒按此失血後服人參一定之法勞傷失血心下痛悶不當作陰虛證治但脈數咳嗽潮熱恐其漸入陰損一途耳生地桃仁楂炭鬱金赤芍製大黃甘草丹皮詒按此證如早服補澀則留瘀化熱最易致損須看其虛實兼到絶不犯手陰不足而陽有餘肝善逆而肺多郁脈數氣喘咳逆見血脅痛治宜滋降更宜靜養不爾恐其血逆不已也小生地荊芥炭白芍童便鬱金藕汁小薊炭詒按此亦氣火上逆之證可加牛膝丹皮離經之血未淨而鬱於內寒熱之邪交煽而亂其氣是以腹滿嘔泄寒熱口燥治當平其亂氣導其積血元氣雖虛未可驟補也丹皮楂炭澤蘭赤芍鬱金丹參牛膝小薊詒按此證挾外感之邪可加荊芥炭黑穭豆衣久咳見血音暗咽痛乍有寒熱此風寒久伏傷肺成勞擬錢氏補肺法聲出則佳阿膠杏仁馬兜鈴牛蒡薏仁貝母糯米又膏方阿膠貝母甘草橘紅杏仁蘇子米糖白蜜薑汁紫菀木通梨汁桔梗牛膝蘿蔔汁茯苓詒按此正虛邪實之證用藥能兩面兼顧尚稱穩適虛損門虛損至食減形瘦當以後天脾胃為要異功散五六服頗得加谷今春半地氣上升肝木用事熱升心悸汗出復咳咳甚見血肝陽上熾絡血遂沸昨進和陽養陰之劑得木火稍平仍以前方加白芍制肝安土生地白芍麥冬阿膠女貞子甘草詒按方亦穩合可加牡蠣丹皮羅氏論虛勞之證多因邪伏血鬱而得不獨陰虧一端也臨晚寒熱時減時增其為陽陷入陰可知滋腎生肝最為合法略加損益不必更張也熟地白芍茯苓丹皮山藥柴胡炙草鱉甲詒按於養陰中加柴胡以達邪佐鱉甲以搜陰虛實兼到極為靈巧然既云邪伏血鬱似宜加當歸再診熱漸減頭中時痛脈數不退喉中痰滯不清青蒿丹皮熟地鱉甲炙草牛膝茯苓小麥詒按似當兼清痰滯兩方中熟地不如改用生地為穩三診體雖不熱脈仍細數宜養陰氣六味丸去萸肉澤瀉加白芍牛膝青蒿鱉甲面黧形瘦脈虛而數咳嗽氣促腰膝無力大便時溏此先後天俱虛慮其延成虛損清潤治肺之品能戕中氣勿更投也紫河車熟地山藥萸肉五味子丹皮茯苓杜仲澤瀉牛膝加蜜丸每服五錢詒按案語得治虛要旨方亦精當絡脈空隙氣必遊行作痛最慮春末夏初地中陽氣上升血隨氣溢趁此綢繆當填精益髓蓋陰虛咳嗽是他臟纍及於肺若治以清涼不獨病不去而胃傷食減立成虛損難為力矣熟地金櫻子膏鹿角霜五味子湘蓮子萸肉山藥茯苓海參漂淨熬膏右為細末即以二膏搗丸詒按此必有遺精腰痠等證故用藥亦不重在咳嗽也汗病門汗出偏沮脈來不柔時自歇止知肝陽有餘而胃陰不足於是稠痰濁火擾動於中壅滯於外目前雖尚安和然古人治未病不治已病知者見微知著須加意調攝為當人參川石斛麥冬南棗製半夏丹皮茯苓炙草小麥詒按此想系左半有汗右半無汗之證細繹案語是防其將患偏痱之意心陰不足心陽易動則汗多善驚腎陰不足腎氣不固則無夢而泄以汗為心液而精藏於腎故也生地茯神甘草麥冬川連柏子仁玄參小麥大棗詒按案語心腎並重方藥似專重於心再加五味子牡蠣沙苑等攝腎之品則周匝矣諸郁門中年脘悶多噯多咳此氣鬱不解也納穀已減未可破泄耗氣宜從胸痹例微通上焦之陽薤白瓜蔞半夏桂枝茯苓薑汁詒按方法輕靈鬱氣凝聚喉間吞不下吐不出梅核氣之漸也半夏厚朴茯苓蘇梗旋覆花橘紅枇杷葉薑汁詒按此於金匱成方中加旋覆杷葉最有巧思寒熱無期中脘少腹遽痛此肝臟之郁也鬱極則發為寒熱頭不痛非外感也以加味逍遙散主之加味逍遙散詒按此木散達之之法病從少陽郁入厥陰復從厥陰逆攻陽明寒熱往來色青顛頂及少腹痛此其候也泄厥陰之實顧陽明之虛此其治也人參柴胡川連陳皮半夏黃芩吳萸茯苓甘草詒按此從左金逍遙化裁而出若再合金鈴子散似更周到此血鬱也得之情志其來有漸其去亦不易也旋覆花薤白鬱金桃仁代赭石紅花詒按此必因血鬱而絡氣不通有胸膈板痛等見證故立方如此嘔噦門胃虛氣熱乾嘔不便橘皮竹茹湯加蘆根粳米再診嘔止熱退石斛茯苓半夏廣皮麥冬粳米蘆根枇杷葉三診大便不通生首烏玄明粉枳殼四診大便通脈和惟宜滋養石斛歸身秦艽白芍丹皮炙草茯苓廣皮詒按迭用四方運意靈巧自能與病機宛轉相赴下既不通勢必上逆而為嘔所謂幽門之氣上衝吸門是也治法自當療下但脈小目陷中氣大傷宜先安中止嘔嘔定再商人參茯苓刺蒺藜竹茹半夏廣皮蘆根石斛詒按似當兼通幽門乃能止嘔擬加生枳實痛嘔之餘脈當和緩而反搏大頭運欲嘔胸滿不食神倦欲臥慮其土隤木張漸致痙厥法當安胃清肝亦古人先事預防之意半夏茯苓廣皮白風米鉤藤竹茹枇杷葉鮮佛手詒按議論極是但恐藥力不足以濟之然方卻清穩所謂清肝者只不過鉤藤竹茹而已擬再加木瓜白芍較似有力病從肝起繼乃及胃茲又及於肺矣然當以胃氣為要久病之體必得安穀不嘔始可圖功石斛蘆根茯苓麥冬廣皮木瓜枇杷葉粳米詒按敘病簡要清沏非績學者不能方亦中窾胃有火邪故嘔而不食膽有熱邪故合目自汗橘皮竹茹湯加石斛詒按山梔必不可少以其專清膽熱故也川連亦在應用之列再診前方去石斛加木瓜嘈雜得食則已此痰火內動心胃陰氣不足生地山梔半夏麥冬茯苓丹皮竹茹炙草詒按陰虛而挾痰者用藥最難恰好方中可加石斛廣皮痰氣阻逆咽嗌時自嘔惡此證利在清降失治則成噎膈半夏枇杷葉旋覆花竹茹茯苓麥冬橘紅鬱金生薑詒按用藥靈動氣鬱痰凝阻隔胃脘食入則噎脈澀難治旋覆花代赭石橘紅半夏當歸川貝鬱金枇杷葉詒按旋覆代赭為噎膈正方食入則噎肺氣先郁故加郁貝枇杷葉惟脈澀者正虛可加人參脈疾徐不常食格不下中氣大衰升降失度旋覆花代赭石麥冬茯苓半夏廣皮人參枇杷葉詒按此因中氣大傷故用參麥朝食暮吐肝胃克賊病屬反胃旋覆花代赭石茯苓半夏吳萸生薑粳米人參枇杷葉詒按此專治吐故加薑萸谷之不入非胃之不納有痰飲以阻之耳是當以下氣降痰為法代赭之用先得我心矣旋覆代赭湯詒按識既老當筆亦爽健因氣生痰痰凝氣滯而中焦之道路塞矣由是飲食不得下行津液不得四布不飢不食口燥便堅必悸頭運經兩月不愈以法通調中氣庶無噎膈腹滿之慮旋覆代赭湯加石菖蒲枳實陳皮詒按論病則源流俱徹用藥則標本兼到細膩尉帖傳作何疑中氣疊傷不能健運朝食暮吐完穀不腐診得脈虛色黑腰腳少力知不獨胃病腎亦病矣此豈細故哉人參附子川椒茯苓益智仁再診前方去川椒益智加川連肉桂詒按完穀不腐色黑腰軟腎傷之徵也改方加桂連是交濟法
