body:
  text: 下卷伏氣門肝陰素虧溫邪擾之發為痙病神昏骱齒瘛瘲不定法當滋養肝陰以榮筋脈清滌痰熱以安神明者也若能應手尚可無慮羚羊角茯神鉤藤貝母阿膠鮮菖蒲竹瀝詒按此證若表邪未解當去阿膠加小生地或鮮生地又按此係伏氣發溫之證與外感風溫有外內之別此證邪由少陰外發潰入厥陰故見證如此羚羊角鉤藤熄風清熱皆治標之品也若圖其本當從陰分托邪俾得外達三陽再與隨經清泄乃奏全功病原治法詳載溫熱逢原中茲不贅述熱傷津液脈細口乾難治蘆根知母川斛蔗漿細生地麥冬甘草梨汁詒按此存陰泄熱之正法所云難治想因脈細之故熱不止頭痛不已紫斑如錦紋咽痛表裡邪盛最為重證犀角豆豉赤芍玄參牛蒡丹皮黃芩甘草詒按當加鮮生地再診去豆豉丹皮加桔梗鮮生地射干熱病十二日不解舌絳口乾胸滿氣促邪火為患亦已甚矣宜景岳玉女煎清熱而存陰否則神識昏冒矣鮮生地石膏麥冬知母竹葉甘草詒按此氣血兩燔之治法熱病四日不汗而舌黃腹中痛下利宜先里而後表不爾恐發狂也大黃柴胡枳實厚朴赤芍詒按先里後表因里證已急於病機固當如是舌乾脈數汗為熱隔雖發之亦不得惟宜甘寒養液雖不發汗汗當自出然必足溫而後熱退乃吉青蒿知母蘆根生地蔗漿竹葉詒按養液以為作汗之源是治溫要旨外感門頭面腫痛此風邪上盛宜辛涼解散荊芥杏仁桔梗牛蒡薄荷甘草馬勃蒼耳子風溫挾痰留滯上焦辛涼解散原為合法時至自解不足憂也牛蒡連翹薄荷川貝豆豉杏仁桔梗蔥白詒按此風溫初起之方風溫鬱於肺胃咳而胸滿痰多脅下痛脈數口乾蘆根薏米瓜蔞甘草杏仁紅花桃仁貝母詒按桃仁紅花因脅痛而用之以和血絡也若邪郁可加豉蒡口乾可加翹芩脈右大舌黃不渴嘔吐黏痰神躁語言不清身熱不解此勞倦內傷更感濕溫之邪須防變端厚朴茯苓滑石陳皮竹葉蔻仁菖蒲根汁詒按此溫邪而挾濕者濕熱上蒙故證情如是此方可以為法濕病門臍中時有濕液腥臭按脈素大此少陰有濕熱也六味能除間濕熱宜加減用之六味丸去山藥加黃柏萆薢女貞子車前子詒按六味治腎間濕熱前人曾有此論藉以治臍中流液恰合病機瘧疾門暑風成瘧噁心胸滿和解則愈半夏黃芩茯苓知母厚朴陳皮竹葉生薑詒按小柴胡法之和解和其表裡兩岐之邪也此之和解和其濕熱兩混之邪也薑夏樸廣去其濕也芩知竹葉清其熱也兩意兼用故亦云和解也又按此濕熱並重者故清燥兼用此與下條皆屬暑濕內伏發為時瘧之病苦辛宣泄最為和法若拘拘於瘧疾之成方概用柴胡鱉甲則誤矣暑風相搏發為時瘧胸滿作噦汗不至足邪氣尚未清解當以苦辛溫法治之藿香半夏杏仁通草厚朴廣皮竹葉詒按此濕重於熱者故用藥稍偏溫燥瘧發而上下血溢責之中虛而邪又擾之也血去既多瘧邪尚熾中原之擾猶未已也誰能必其血之不復來耶謹按古法中虛血脫之證從無獨任血藥之理而瘧病經久亦必固其中氣茲擬理中一法止血在是止瘧亦在是惟高明裁之人參白朮炮姜炙草詒按識見老確議論精切所立理中一法誠屬血脫益氣固中止血之要藥惟愚意所欲商者瘧來而上下血溢必因瘧疾之熱擾及血絡而然於理中法內參用安宮清絡之意似乎更為周到且標本兼顧於立方正意亦不相刺謬也三瘧是邪伏陰分而發非和解可愈久發不止補劑必兼升陽引伏邪至陽分乃愈人參歸身鹿角膠杞子鹿茸附子茯苓沙苑詒按陰瘧本有此法而不能概用此法須相題為之瘧病方已遂得脾約脾約未已又增厥疼心腹時滿時減或得身熱汗出則疼滿立止明系瘧邪內陷於太陰陽明之間是必邪氣仍從少陽外達則不治疼而疼自止不治脹而脹自消矣詒按論病已得要領惜方佚未見瘧後脅下積癖作疼夜熱口乾溺赤陰虛邪伏宜鱉甲煎鱉甲白芍青皮丹皮首烏柴胡知母炙草詒按此邪伏陰分之治法當歸亦可加入瘧後脅下積痞不消下連少腹作脹此肝邪也當以法疏利之人參柴胡青皮桃仁茯苓半夏甘草牡蠣黃芩生薑詒按此小柴胡法也加青皮以疏肝桃仁以和瘀牡蠣以軟堅用意可云周到惟少腹作脹乃肝邪下陷之證若再加川楝子歸尾延胡似更完密瘧止復發汗多作嘔中氣虛逆宜益陽明半夏茯苓廣皮人參石斛蘆根薑汁再診寒熱已止汗嘔並減宜和養營衛人參桂枝石斛廣皮歸身炙草麥冬白芍詒按此膏粱虛體治法兩方俱清穩熨帖黃疸門面黑目黃脈數而微足寒至膝皮膚爪甲不仁其病深入少陰而其邪則仍自酒濕得之及女勞也腎氣丸詒按此證載在金匱近於愛廬醫案中見一方甚佳此病兼有瘀血不但濕也腎氣丸能否見效尚未可定面目身體悉黃而中無痞悶小便自利此仲景所謂虛黃也即以仲景法治之桂枝黃耆白芍茯苓生薑炙草大棗詒按案明藥當濕停熱聚上逆則咽嗌不利外見則身目為黃下注則溺赤而痛茵陳厚朴豆豉木通豬苓橘紅茯苓黑梔詒按論病能一線穿成用藥自絲絲入筘又按咽嗌不利可加桔梗前胡之類痹氣門胸背為陽之分痹著不通當通其陽蓋陽不外行而鬱於中則內反熱而外反寒通陽必以辛溫而辛溫又礙於臟氣擬辛潤通肺以代之紫菀三兩煎湯服詒按此巧法也特未知效否若何濕邪郁遏陽氣不宣外寒裡熱胸滿溺赤宜開達上焦紫菀桔梗鬱金白蔻枳殼杏仁貝母甘草詒按此治肺痹之正法氣窒不散便閉喘急不能偃臥猝難消散也紫菀葶藶厚朴杏仁橘紅鬱金枳殼詒按此證較前更急兼有便閉故用藥從中焦泄降再診大黃厚朴檳榔枳殼杏仁詒按輕劑不效故更與通腑以泄肺胸中為陽之位陽氣不布則窒而不通宜溫通不宜清開愈開則愈窒矣桂枝茯苓乾薑炙草益智仁詒按再參入開痹之品如杏菀橘桔等似更靈動食入則胸背痞塞作脹噫氣不舒此陽氣不通宜辛通之法草蔻仁半夏桂枝茯苓乾薑炙草詒按此證亦與胸痹相似脘腹痛門蛔厥心痛痛則嘔吐酸水手足厥冷宜辛苦酸治之川連桂枝歸身延胡烏梅川椒茯苓川楝子炮姜詒按此烏梅丸法也此腎厥也心疼背脹引及腰中議用許學士香茸丸鹿茸杞子沙苑大茴香麝香詒按寒襲於腎而氣上逆故用溫養脹及腰背者督陽不用也鹿茸溫通督脈麝香開泄濁陰故以之為君脈弦小腹痛食後胃脘痛上至咽嗌肝火乘胃宜泄厥陰和陽明川楝子木通茯苓甘草石斛木瓜詒按擬加延胡山梔仁心腹痛脈弦色青是肝病也川楝子歸身茯苓石斛延胡木瓜詒按立方穩合瘕癖門臍下積塊捫之則熱病者自言前後二陰俱覺熱痛其為熱結可知況自來之病皆出於肝耶鄙見非泄厥陰不能獲效龍薈丸五十粒酒下絡病瘀痹左脅板實前年用蟲蟻通血升降開發已效但胸脘似是有形按之微痛前藥太峻茲用兩調氣血以緩法圖之醋炒延胡薑黃阿魏桃仁生香附麝香歸鬚為末蜜丸每服二錢詒按承前方來雖曰兩調氣血而仍以疏瘀為主脈虛數色白不澤左脅有塊杯大大便小便自利病在肝家營血不和此為虛中有實補必兼通白朮歸身炙草白芍生地茯苓琥珀廣皮桃仁紅花沉香鬱金詒按方治親切不膚時病食復至今不知飢飽大便不爽右脅之旁虛里天樞隱隱有形此陽明胃絡循行之所多噯氣不化並不煩渴豈是攻消急驅實熱之證耶擬用丹溪泄木安土法小溫中丸如半月後有效仍以前法詒按此中焦濕積阻結之證左脅積塊日以益大按之則痛食入不安凡痞結之處必有陽火鬱伏於中故見煩躁口乾心熱等證宜以苦辛寒藥清之開之然非易事也川連枳實香附川芎神麯茯苓青皮赤芍詒按脅塊有形益大則營絡必窒似宜兼通乃效大腹右有形為聚脈大食入即作脹治在六腑白朮茯苓廣皮生香附汁三稜厚朴草果山楂詒按方以疏通氣分為主心下高突延及左脅有形漸加腹脹思正月暴寒口鼻吸受冷氣入胃絡膜原清陽不用濁陰凝阻胃氣重傷有單腹之累殊非小恙厚朴草果半夏乾薑茯苓蓽拔另蘇合香丸一粒化服詒按寒邪閉於營絡故用溫通方中可加桂枝尖腫脹門脈遲胃冷腹脹氣攻胸脅噁心少食泄瀉宜振脾胃之陽乾薑益智仁半夏厚朴神麯檳榔川椒茯苓詒按此溫中調氣法也命門陽衰脾失溫養不克健運食入輒脹法當溫補下焦腎氣丸去桂加沉香椒目詒按此補火生土之法濕熱內陷太陰而成脹茅朮川柏厚朴陳皮桑皮木通澤瀉大腹皮草果仁詒按此專治脾土濕熱古方小溫中丸亦可服脈微遲左脅宿痞腹漸脹大便溏溺少此是濁陰上攻當與通陽熟附子遠志椒目小茴香澤瀉茯苓詒按此溫通治脹之正法脾氣本弱而更受木克克則益弱矣由是脾健失職食入不消遂生脹滿脾愈弱則肝愈強時時攻逆上下有聲半載之疾年逾六旬非旦夕可圖也人參茯苓川楝子楂核甘草木瓜白芍吳萸橘核詒按此肝脾兩治而偏重於肝者以其不特脹滿而兼有攻逆之證也脈弦中滿病在肝脾人參吳萸木瓜厚朴廣皮半夏詒按此肝脾兩治之正法立方精簡可法右關獨大而搏指知病在中焦飲食不化痞悶時痛積年不愈喉間自覺熱氣上衝口乾作苦舌苔白燥此脾家積熱鬱濕當以瀉黃法治之茅朮葛根茯苓石膏藿香木香詒按此痞滿門中不常見之證存之以備一格脈證合參乃氣結在上津不運行蒸變濁痰由無形漸變有形徐之才謂輕可去實非膠固陰藥所宜白蔻薏仁杏仁厚朴枇杷葉汁降香汁詒按此方具有輕清靈三字之妙勞郁交傷營衛不和胸中滿痛時有寒熱與六淫外感不同治宜和養氣血逍遙散詒按再增枳樸等寬中之品則更周到矣脾以健運為職心下痞不能食食則滿悶脾失其職矣但健運之品迂緩無功宜以補瀉升降法治之人參乾薑半夏茯苓川連枳實陳皮生薑詒按此方仿瀉心法加味脅下素有痞氣時時沖逆今見中滿氣攻作痛吞酸嘔吐能俯而不能仰此厥陰鬱滯之氣侵入太陰之分得之多怒且善郁也病久氣弱不任攻達而病氣久郁亦難補養為掣肘耳姑以平調肝胃之劑和之痛定食進方許萬全半夏廣皮川楝子橘核茯苓青皮炙甘草木瓜詒按審察病機至為精細立方亦周到熨帖胃陽衰憊氣阻痰凝中脘不快食下則脹宜辛溫之品治之草果仁厚朴茯苓半夏甘草檳榔詒按此濕痰阻遏中宮之證熱結氣閉腹脹便難厚朴杏仁滑石黃芩大腹皮茯苓皮木通詒按此運中兼泄熱法也腹脹面浮跗腫食不下欲嘔脾虛受濕健運失常非輕證也茅朮茯苓廣皮桑皮木通厚朴澤瀉半夏豬苓詒按此運中利濕法也面黑目黃腹滿足腫囊腫濕熱壅滯從脾及腎病深難治蒼朮制軍厚朴陳皮木通茵陳豬苓椒目澤瀉詒按邪機壅滯正氣已傷故云難治臥則喘息有音此腫脹乃氣壅於上宜用古人開鬼門之法以治肺通表麻黃杏仁薏仁甘草詒按此兼喘逆故專治肺風濕相搏面浮腹滿足腫大小便不利杏仁蘇子厚朴陳皮豬苓大腹皮姜皮木通詒按此表裡兩通法也腫脹之病而二便如常肢冷氣喘是非行氣逐水之法所能愈者矣當用腎氣丸行陽化水然亦劇病也腎氣丸詒按此病陽衰氣窒不治之證也頭痛門火升頭痛耳鳴心下痞滿飯後即發此陽明少陽二經痰火交郁得食氣而滋甚與陰虛火炎不同先與清理繼以補降竹茹茯苓橘紅炙草半夏羚羊角石斛嫩鉤藤鉤詒按案語分析病機極其圓到惟立方似未恰合陽明藥少宜加知母枳實頭疼偏左耳重聽目不明脈寸大尺小風火在上姑為清解羚羊角生地甘草菊花丹皮石決明連翹薄荷詒按此內風而兼外感者故清散兼施風熱上甚頭痛不已如鳥巢高巔宜射而去之制軍犀角川芎細茶詒按此雖前人成法而選藥頗精簡據此則大黃當用酒炒以使之上行肢體諸痛門風邪中入經絡從肩膊至項強痛舌乾唇紫而腫痛處如針刺之狀此是內挾肝火不宜過用溫散惟宜養陰熄肝火而已羚羊角細生地甘菊黃芩鉤勾秦艽丹皮詒按因唇紫舌乾故知內挾肝火方中黃芩不若山梔為當項背痛如刀割治宜養血通絡桂枝鉤藤白芍知母羚羊角阿膠炙草生地詒按擬去知母加歸鬚刺蒺藜絲瓜絡身半以上痛引肩臂風濕在於太陰之分行動則氣促不舒胸膚高起治在經絡大活絡丹詒按擬用旋覆新絳湯送下脾腎寒濕下注右膝腫痛而色不赤其脈當遲緩而小促食少輒嘔中氣之衰亦已甚矣此當以和養中氣為要腫痛姑置勿論蓋未有中氣不復而膝得愈者也人參半夏木瓜炒粳米茯苓廣皮益智仁詒按議論明通背脊為督脈所過之處風冷乘之脈不得通則惡寒而痛法宜通陽鹿角霜白芍炙草桂枝歸身半夏生薑南棗詒按方中半夏無所取義擬再加杜仲狗脊以通陽身痛偏左血不足風乘之也半夏秦艽歸身廣皮茯苓丹參川斷炙草詒按案只一二句卻有簡逸之致久咳脅痛不能左側病在肝逆在肺得之情志難以驟驅治法不當求肺而當求肝旋覆花丹皮桃仁鬱金猩絳甘草牛膝白芍詒按審證用藥巧力兼到擬再加青皮桑皮紫蘇山梔瓦楞子殼脅疼遇春即發過之即止此肝病也春三月肝木司令肝陽方張而陰不能從則其氣有不達之處故痛夏秋冬肝氣就衰與陰適協故不痛也阿膠白芍茯苓丹皮茜草炙草鮑魚湯代水詒按樸實說理絕無躲閃方用膠芍鮑魚滋肝配陽亦覺妥貼易施風氣乘虛入於腎絡腰中痛引背脅宜寄生湯補虛通絡祛風生地歸身黑大豆獨活山藥白蒺藜杜仲炙草桑寄生詒按立方妥貼層折俱到脈數耳鳴吐痰天柱與腰膝痠痛兩足常冷病屬陰虧陽升法當填補實下熟地鹿角霜菟絲子山藥萸肉杞子龜板膠諸竅門風熱蓄於腦髓發為鼻淵五年不愈此壅疾也壅則宜通不通則不治犀角蒼耳子黃芩鬱金杏仁蘆根詒按既欲其通則辛夷白芷似不可少肺之絡會於耳中肺受風火久而不清竅與絡俱為之閉所以鼻塞不聞香臭耳聾耳鳴不聞音聲也茲當清通肺氣蒼耳子薄荷桔梗連翹辛夷黃芩山梔杏仁甘草木通詒按語云耳聾治肺觀此信然少陽之脈循耳外走耳中是經有風火則耳膿而鳴治宜清散薄荷連翹甘菊芍藥黃芩刺蒺藜甘草木通詒按案既老當方亦清靈腎虛齒痛入暮則發非風非火清散無益加減八味丸每服三錢鹽花湯下詒按立方精到腳氣門厥陰之邪逆攻陽明始為腫痛繼而腹疼胸滿嘔吐此屬腳氣衝心非小恙也擬外臺法治之犀角檳榔茯苓枳實杏仁橘紅半夏木通木瓜再診半夏木瓜廣皮蘆根枳實茯苓竹茹枇杷葉詒按腳氣一證前人歸入類傷寒中必憎寒壯熱病與傷寒相似甚則有衝心之患故謂之重證外臺有大犀角湯及風引湯後人有雞鳴散等方均為專治腳氣之重劑乃今時所謂腳氣者則以腳膝痠軟而腫者謂之濕腳氣不腫者謂之乾腳氣專用防己木瓜牛膝薏米等風濕之藥治之與前人所稱者大相徑庭學者不可不辨遺精門遺精無夢小勞即發飢不能食食多即脹面白唇熱小便黃赤此脾家濕熱流入腎中為遺精不當徒用補澀之藥恐積熱日增致滋他族萆薢砂仁茯苓牡蠣白朮黃柏炙草山藥生地豬苓詒按此等證早服補澀每多愈服愈甚者先生此案可謂大聲疾呼再診服藥後遺滑已止唇熱不除脾家尚有餘熱故也前方去砂仁黃柏加川連苦參詒按唇熱屬脾少陰為三陰之樞內司啟閉虛則失其常矣法宜填補少陰或通或塞皆非其治六味丸去瀉加菟絲子沙苑杞子詒按此補腎之平劑可以常服無弊遺精傷腎氣不收攝人夜臥著氣衝上膈腹脹呼吸不通竟夕危坐足跗浮腫清冷小便漸少此本實先撥枝將敗矣難治之證也都氣丸加牛膝肉桂詒按此陰陽兩損氣不攝納之重證舍此竟無良法然亦未能必效也陰虧陽動內熱夢泄六味丸加黃柏砂仁詒按六味合封髓法也亦妥貼易施小便門兩尺軟弱根本不固小便渾濁病在腎臟久久不愈則成下消六味丸加天冬麥冬杞子五味子詒按方法穩切形偉體豐脈得小緩凡陽氣發泄之人外似有餘內實不足水穀之氣不得陽運釀濕下注而為濁病已三四年矣氣墜宜升陽為法非比少壯陰火自灼之病菟絲子茴香車前子韭子蒺藜茯苓覆盆子蛇床子黃魚骨搗丸每服五錢詒按此證當以脾土為主但與溫養下元尚非潔源清流之道又按此與相火下注者不同故用藥如是煩勞四十餘天心陽自亢腎水暗傷陽墜入陰故溲數便血不覺管窒痛痹實與淋證不同其中雖不無濕熱而寢食安然不必滲泄利濕宜寧心陽益腎陰宣通腎氣以和之熟地炭人參霍石斛丹皮澤瀉茯苓遠志柏子仁湖蓮肉詒按此治本之方由其論病親切故立方自穩泄瀉門惱怒傷中濕熱乘之脾氣不運水穀並趨大腸而為泄腹中微疼脈窒不和治在中焦藿梗川樸神麯澤瀉茯苓陳皮扁豆木瓜詒按此方妙在木瓜一味兼能疏肝須知此意乃識立方選藥之妙又按案中脈窒句不甚明瞭痢疾門暑濕外侵經絡則為瘧內動腸藏則為痢而所恃以攘外安內者則在胃氣故宜和補之法勿用攻削之劑恐邪氣乘虛盡入於裡也詒按案語殊妙惜此方之佚也大便門氣鬱不行津枯不澤飲食少大便難形瘦脈澀未可概與通下宜以養液順氣之劑治之生地當歸桃仁紅花枳殼麻仁甘草杏仁詒按此氣阻液枯之證擬加鮮首烏大便閉結水液旁流便通則液止矣大承氣湯加甘草詒按據吳鞠通之論用調胃承氣法為穩再診前方加當歸白芍三診改用制軍加潯桂厚朴下血後大便燥閉不爽繼而自利白滑膠黏日數十行形衰脈沉必因久伏水穀之濕府病宜通以溫下法生茅朮制軍熟附子厚朴詒按自利膠滑有因燥矢不行氣迫於腸而脂膏自下者當專行燥矢兼養腸液未可概以濕論也脾約者津液約束不行不飢不大便備嘗諸藥中氣大困仿古人以食治之法黑芝麻杜蘇子二味煎濃汁如飴服三五日即服人乳一杯燉溫入薑汁二匙詒按此無法之法也良工心苦矣便血不獨責虛亦當責濕所以滋補無功而疏利獲益也茲足痠無力其濕不但在脾又及腎矣當作脾腎濕熱成痹治之萆薢薏仁白朮石斛牛膝生薑詒按案語明確方亦簡當瀉痢便血五年不愈色黃心悸肢體無力此病始於脾陽不振繼而脾陰亦傷治當陰陽兩顧為佳人參白朮附子炙草熟地阿膠伏龍肝黃芩詒按此理中合黃土湯法也方案俱切實不膚鼻癢心辣大便下血形瘦脈小而數已經數年黃芩阿膠白芍炙草詒按此陰虛而有伏熱之證方特精簡外瘍門肝經液聚氣凝為項間痰核病雖在外其本在內切不可攻攻之則愈甚矣首烏象貝白芍牛膝甘草牡蠣粉歸身生地丹皮詒按議論平和立方清穩牡蠣粉一味可以化痰消堅瘍證以能食為要茲先和養胃氣石斛茯苓益智仁穀芽木瓜廣皮詒按案語片言居要惟用藥嫌少力量脈虛細數陰不足也鼠漏未愈熱在大腸六味丸加杞子天冬龜板黃柏知母五味子詒按此肛門漏也名為鼠漏未知所本脈證已屬損象故以滋補肝腎為主婦人門脾虛生濕氣為之滯血為之不守此與血熱經多者不同白朮澤瀉白芍廣皮炙草茯苓牛角腮灰川芎詒按認證既的藥亦絲絲入筘腹滿足腫泄瀉此屬胎水得之脾虛有濕白朮茯苓澤瀉廣皮厚朴川芎蘇葉姜皮黃芩詒按方案俱老當胎前喘咳腫滿是脾濕不行上侵於肺手足太陰病也治在去濕下氣茯苓陳皮白芍澤瀉厚朴當歸蘇梗杏仁詒按方頗靈動再加紫菀枇杷葉何如產後惡露不行小腹作痛漸見足腫面浮喘咳此血滯於先水漬於後宜兼治血水如甘遂大黃之例紫菀茯苓桃仁牛膝青皮杏仁山楂肉小川樸延胡詒按用其例而易其藥因原方太峻也再診瘀血不下走而上逆急宜以法引而下之否則沖逆成厥矣歸身滑石蒲黃通草牛膝瞿麥五靈脂赤芍三診膈寬而腹滿血瘀胞中宜以緩法下之大黃青皮炙草丹皮桃仁赤芍歸身又丸方牛膝一兩赤芍延胡蒲黃五靈脂川芎桂枝桃仁各五錢歸尾丹皮各八錢詒按迭換四方一層深一層次序秩然恰與病機宛轉相赴胎前病子腫產後四日即大泄泄已一笑而厥不省人事及厥回神清而左脅前後痛滿至今三月餘矣形瘦脈虛食少少腹滿足腫小便不利此脾病傳心心不受邪即傳之於肝肝受病而更傳之於脾也此為五臟相賊與六腑食氣水血成脹者不同所以攻補遞進而絕無一效也宜泄肝和脾法治之白朮木瓜廣皮椒目茯苓白芍詒按此等證情非胸中有古書者不能道隻字
